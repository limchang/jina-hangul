    /* 탭 */
    #tabs { display: flex; gap: 7px; margin-bottom: 12px; }
    .tab-btn {
      padding: 6px 18px; border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7); font-size: 0.92rem;
      cursor: pointer; transition: all 0.18s; font-family: inherit;
    }
    .tab-btn.active {
      background: rgba(175,70,255,0.45); border-color: rgba(200,120,255,0.9);
      color: #fff; box-shadow: 0 0 13px rgba(175,70,255,0.5);
    }

    /* 글자 버튼 */
    #letter-selector {
      display: flex; flex-wrap: wrap; gap: 7px;
      justify-content: center; margin-bottom: 14px; max-width: 560px;
    }
    .letter-btn {
      width: 48px; height: 48px; border-radius: 11px;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07); color: #fff;
      font-size: 1.3rem; cursor: pointer; transition: all 0.16s; font-family: inherit;
    }
    .letter-btn:hover { background: rgba(200,100,255,0.28); border-color: rgba(200,100,255,0.6); transform: scale(1.07); }
    .letter-btn.active {
      background: rgba(195,75,255,0.55); border-color: #cc66ff;
      transform: scale(1.11); box-shadow: 0 0 14px rgba(195,75,255,0.6);
    }

    /* 캔버스 */
    #canvas-wrap {
      position: relative; width: 320px; height: 320px;
      border-radius: 20px;
      box-shadow: 0 0 0 2px rgba(175,90,255,0.45),
                  0 0 40px rgba(175,90,255,0.35),
                  0 0 80px rgba(90,120,255,0.15);
    }
    #guide-canvas, #draw-canvas, #stroke-canvas {
      position: absolute; top: 0; left: 0; width: 320px; height: 320px;
    }
    #draw-canvas { cursor: crosshair; }

    /* 획순 번호 버튼 */
    .stroke-num-btn {
      position: absolute;
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: bold; font-family: inherit;
      cursor: grab;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      z-index: 10;
      border: 3px solid rgba(255,220,80,0.95);
      background: rgba(255,205,40,0.97);
      color: #1a0533;
      box-shadow: 0 0 18px rgba(255,200,50,0.9), 0 2px 8px rgba(0,0,0,0.5);
      user-select: none;
      touch-action: none;
      transition: box-shadow 0.15s;
      animation: btnAppear 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes btnAppear {
      from { transform: translate(-50%,-50%) scale(0); opacity:0; }
      to   { transform: translate(-50%,-50%) scale(1); opacity:1; }
    }
    .stroke-num-btn.dragging {
      cursor: grabbing;
      box-shadow: 0 0 28px rgba(255,200,50,1), 0 0 8px rgba(255,255,255,0.6), 0 2px 12px rgba(0,0,0,0.5);

    }
    .stroke-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);

function resizeBg() { bgCanvas.width = innerWidth; bgCanvas.height = innerHeight; }
resizeBg();
window.addEventListener('resize', resizeBg);

const bgPts = Array.from({length: 65}, () => ({
  x: Math.random() * innerWidth, y: Math.random() * innerHeight,
  r: Math.random() * 1.7 + 0.4,
  dx: (Math.random() - 0.5) * 0.22, dy: (Math.random() - 0.5) * 0.22,
  a: Math.random() * 0.45 + 0.12, h: Math.random() * 60 + 248
}));
(function bgLoop() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  for (const p of bgPts) {
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `hsla(${p.h},100%,75%,${p.a})`;
    bgCtx.fill();
    p.x = (p.x + p.dx + bgCanvas.width)  % bgCanvas.width;
    p.y = (p.y + p.dy + bgCanvas.height) % bgCanvas.height;
  }
  requestAnimationFrame(bgLoop);
})();

// ══════════════════════════════════════════
// 5. 드로잉 파티클 클래스
// ══════════════════════════════════════════
const particles = [];
class Particle {
  constructor(x, y, hue) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 3.5 + 0.8;
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd - 1.5;
    this.life  = 1.0;
    this.decay = Math.random() * 0.025 + 0.012;
    this.r     = Math.random() * 7 + 2;
    this.hue   = hue ?? (Math.random() * 80 + 250);
    this.isStar = Math.random() < 0.3;
  }
  update() {
    this.x  += this.vx; this.y  += this.vy;
    this.vy += 0.09; this.vx *= 0.985;
    this.life -= this.decay; this.r *= 0.975;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save(); ctx.globalAlpha = this.life;
    if (this.isStar) {
      ctx.save(); ctx.translate(this.x, this.y); ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i*4*Math.PI/5) - Math.PI/2;
        i === 0 ? ctx.moveTo(Math.cos(a)*this.r, Math.sin(a)*this.r)
                : ctx.lineTo(Math.cos(a)*this.r, Math.sin(a)*this.r);
      }
      ctx.closePath(); ctx.fillStyle = `hsl(${this.hue},100%,72%)`; ctx.fill(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
      g.addColorStop(0, `hsl(${this.hue+30},100%,92%)`);
      g.addColorStop(1, `hsla(${this.hue},100%,60%,0)`);
      ctx.fillStyle = g; ctx.fill();
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════
// 6. SVG Path 유틸
// ══════════════════════════════════════════
function samplePath(pathStr, n = 60) {
  const pts = [];
  const cmds = pathStr.match(/[MLHVC][^MLHVC]*/g) || [];
  let cx = 0, cy = 0, steps;
  for (const cmd of cmds) {
    const t = cmd[0];
    const nums = cmd.slice(1).trim().split(/[\s,]+/).map(Number);
    if (t === 'M') {
      cx = nums[0]; cy = nums[1]; pts.push({x:cx, y:cy});
    } else if (t === 'L') {
      steps = Math.max(8, Math.ceil(n / cmds.length));
      for (let i = 1; i <= steps; i++) {
        pts.push({ x: cx + (nums[0]-cx)*i/steps, y: cy + (nums[1]-cy)*i/steps });
      }
      cx = nums[0]; cy = nums[1];
    } else if (t === 'C') {
      const [cx1,cy1,cx2,cy2,ex,ey] = nums;
      steps = Math.max(12, Math.ceil(n / cmds.length));
      for (let i = 1; i <= steps; i++) {
        const u = i/steps, v = 1-u;
        pts.push({
          x: v*v*v*cx + 3*v*v*u*cx1 + 3*v*u*u*cx2 + u*u*u*ex,
          y: v*v*v*cy + 3*v*v*u*cy1 + 3*v*u*u*cy2 + u*u*u*ey
        });
      }
      cx = ex; cy = ey;
    }
  }
  return pts;
}

function pathStartPt(pathStr) {
  const m = pathStr.match(/M\s*([\d.]+)[,\s]+([\d.]+)/);
  return m ? {x:+m[1], y:+m[2]} : {x:160,y:160};
}

function pathStartDir(pathStr) {
  const pts = samplePath(pathStr, 10);
  if (pts.length < 2) return {x:1,y:0};
  const dx = pts[2].x - pts[0].x, dy = pts[2].y - pts[0].y;
  const len = Math.hypot(dx,dy) || 1;
  return {x:dx/len, y:dy/len};
}

// ══════════════════════════════════════════
// 7. 획 상태 관리
// ══════════════════════════════════════════
let strokeDone   = [];
let activeStroke = -1;
const HIT_RADIUS  = 24;
const COVER_RATIO = 0.38; // 38% 커버하면 획 인정

function initStrokes(letter) {
  const data = STROKE_DATA[letter];
  strokeDone   = data ? new Array(data.length).fill(false) : [];
  activeStroke = -1;
  updateProgressDots();
}

function findNearestStroke(px, py) {
  const data = STROKE_DATA[currentLetter];
  if (!data) return -1;
  // 현재 순서에서 완료 안 된 첫 번째 획부터 찾기
  // (순서대로 써야 하므로 이전 획이 완료되지 않으면 이후 획 시작 불가)
  const nextIdx = strokeDone.indexOf(false);
  if (nextIdx < 0) return -1;

  // nextIdx 획의 시작점 근처인지만 확인 (±HIT_RADIUS)
  const sp = pathStartPt(data[nextIdx].path);
  if (Math.hypot(px - sp.x, py - sp.y) <= HIT_RADIUS * 1.5) return nextIdx;
  return -1;
}

function checkCoverage(userPath, strokeIdx) {
  const data = STROKE_DATA[currentLetter];
  if (!data) return 0;
  const pts = samplePath(data[strokeIdx].path, 40);
  let covered = 0;
  for (const sp of pts) {
    for (const up of userPath) {
      if (Math.hypot(sp.x-up.x, sp.y-up.y) < HIT_RADIUS) { covered++; break; }
    }
  }
  return covered / pts.length;
}

function updateProgressDots() {
  const bar = document.getElementById('stroke-progress');
  const data = STROKE_DATA[currentLetter];
  bar.innerHTML = '';
  if (!data) return;
  data.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'stroke-dot' +
      (strokeDone[i] ? ' done' : (i === strokeDone.indexOf(false) ? ' active' : ''));
    bar.appendChild(dot);
  });
  const hint = document.createElement('span');
  hint.id = 'stroke-hint';
  const done = strokeDone.filter(Boolean).length;
  hint.textContent = `${done} / ${data.length} 획`;
  bar.appendChild(hint);
}

// ══════════════════════════════════════════
// 8. 가이드 배경 + 획 렌더링
// ══════════════════════════════════════════
function drawBackground() {
  gCtx.clearRect(0, 0, W, H);
  // 배경
  gCtx.fillStyle = 'rgba(14,7,44,0.93)';
  gCtx.beginPath(); gCtx.roundRect(0,0,W,H,20); gCtx.fill();
  // 격자
  gCtx.strokeStyle = 'rgba(255,255,255,0.07)'; gCtx.lineWidth = 1;
  gCtx.setLineDash([4,7]);
  gCtx.beginPath();
  gCtx.moveTo(W/2,10); gCtx.lineTo(W/2,H-10);
  gCtx.moveTo(10,H/2); gCtx.lineTo(W-10,H/2);
  gCtx.stroke(); gCtx.setLineDash([]);
  // 테두리
  gCtx.strokeStyle = 'rgba(155,90,255,0.28)'; gCtx.lineWidth = 1.5;
  gCtx.setLineDash([7,5]);
  gCtx.beginPath(); gCtx.roundRect(13,13,W-26,H-26,13); gCtx.stroke();
  gCtx.setLineDash([]);
}

function drawGuideStrokes(letter) {
  drawBackground();
  const data = STROKE_DATA[letter];
  if (!data) {
    gCtx.save();
    gCtx.font = `900 210px 'Malgun Gothic','맑은 고딕',sans-serif`;
    gCtx.textAlign = 'center'; gCtx.textBaseline = 'middle';
    gCtx.strokeStyle = 'rgba(190,130,255,0.55)'; gCtx.lineWidth = 4;
    gCtx.strokeText(letter, W/2, H/2+8);
    gCtx.fillStyle = 'rgba(200,160,255,0.28)'; gCtx.fillText(letter, W/2, H/2+8);
    gCtx.restore();
    return;
  }

  sCtx.clearRect(0, 0, W, H);

  data.forEach((stroke, i) => {
    const done   = strokeDone[i];
    const isNext = i === strokeDone.indexOf(false);
    const p2d    = new Path2D(stroke.path);

    gCtx.save();
    gCtx.lineCap = 'round'; gCtx.lineJoin = 'round';
    if (done) {
      gCtx.strokeStyle = 'rgba(210,155,255,0.95)';
      gCtx.lineWidth = 32;
    } else if (isNext) {
      gCtx.strokeStyle = 'rgba(255,255,255,0.40)';
      gCtx.lineWidth = 30;
      gCtx.setLineDash([16,11]);
    } else {
      gCtx.strokeStyle = 'rgba(160,110,220,0.22)';
      gCtx.lineWidth = 26;
      gCtx.setLineDash([10,12]);
    }
    gCtx.stroke(p2d);
    gCtx.setLineDash([]);
    gCtx.restore();
  });

  updateStrokeButtons(letter);
}

// ── 번호 버튼 DOM 관리 ──
// 현재 차례 버튼 하나만 표시. 완료되면 제거 후 다음 버튼 등장.
function updateStrokeButtons(letter) {
  const wrap = document.getElementById('canvas-wrap');
  wrap.querySelectorAll('.stroke-num-btn').forEach(el => el.remove());

  const data = STROKE_DATA[letter];
  if (!data) return;

  const nextIdx = strokeDone.indexOf(false);
  if (nextIdx < 0) return; // 모두 완료

  const stroke = data[nextIdx];
  const sp  = pathStartPt(stroke.path);
  const dir = pathStartDir(stroke.path);
  const angleDeg = Math.atan2(dir.y, dir.x) * 180 / Math.PI;

  const btn = document.createElement('div');
  btn.className = 'stroke-num-btn';
  btn.id = 'active-stroke-btn';
  btn.dataset.strokeIdx = nextIdx;
  btn.textContent = String(stroke.n);
  btn.style.left = sp.x + 'px';
  btn.style.top  = sp.y + 'px';

  // 방향 화살표 (버튼 내부, 어두운 색)
  const arrow = document.createElement('span');
  arrow.style.cssText = `
    position:absolute; left:50%; top:50%;
    width:32px; height:3px;
    background:rgba(30,10,80,0.65);
    transform-origin:0 50%;
    transform:rotate(${angleDeg}deg) translateY(-50%);
    pointer-events:none; border-radius:2px;
  `;
  const head = document.createElement('span');
  head.style.cssText = `
    position:absolute; right:-2px; top:50%;
    transform:translateY(-50%);
    border-top:5px solid transparent;
    border-bottom:5px solid transparent;
    border-left:9px solid rgba(30,10,80,0.75);
  `;
  arrow.appendChild(head);
  btn.appendChild(arrow);

  btn.addEventListener('mousedown', e => { e.preventDefault(); startStrokeDrag(e, nextIdx, btn); });
  btn.addEventListener('touchstart', e => { e.preventDefault(); startStrokeDrag(e, nextIdx, btn); }, { passive:false });

  wrap.appendChild(btn);
}

// ══════════════════════════════════════════
// 9. 파티클 렌더 루프 (필기선 없음)
// ══════════════════════════════════════════
let currentPath  = [];
const drawnPaths = [];

(function drawLoop() {
  dCtx.clearRect(0, 0, W, H);
  // 파티클만
  for (let i=particles.length-1;i>=0;i--) {
    particles[i].update(); particles[i].draw(dCtx);
    if (particles[i].life<=0) particles.splice(i,1);
  }
  requestAnimationFrame(drawLoop);
})();

// ══════════════════════════════════════════
// 10. 탭 & 버튼
// ══════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', Object.keys(TABS)[i] === tab);
  });
  renderButtons(TABS[tab]);
  selectLetter(TABS[tab][0]);
}

function renderButtons(letters) {
  const sel = document.getElementById('letter-selector');
  sel.innerHTML = '';
  letters.forEach((l,i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn' + (i===0?' active':'');
    btn.textContent = l;
    btn.onclick = () => selectLetter(l);
    sel.appendChild(btn);
  });
}

function selectLetter(l) {
  currentLetter = l;
  document.querySelectorAll('.letter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === l);
  });
  clearDrawing();
  initStrokes(l);
  drawGuideStrokes(l);
}

// ══════════════════════════════════════════
// 11. 마우스 / 터치 입력
// ══════════════════════════════════════════
function getCanvasPos(clientX, clientY) {
  const rect = drawCanvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  return { x:(clientX-rect.left)*sx, y:(clientY-rect.top)*sy };
}
function getPos(e) {
  const src = e.touches ? e.touches[0] : e;
  return getCanvasPos(src.clientX, src.clientY);
}
function spawnParticles(x, y, n=5, hue) {
  for (let i=0;i<n;i++) particles.push(new Particle(x,y,hue));
}

let drawing = false;
let dragBtn = null;   // 현재 드래그 중인 버튼 DOM
let dragPath = [];    // 버튼이 지나간 캔버스 좌표 경로

// 버튼 드래그 시작
function startStrokeDrag(e, idx, btn) {
  drawing = true;
  activeStroke = idx;
  dragBtn = btn;
  dragPath = [];

  const p = getPos(e);
  dragPath.push(p);
  btn.classList.add('dragging');
  spawnParticles(p.x, p.y, 8, 55);

  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup',   onDragEnd);
  window.addEventListener('touchmove', onDragMoveT, { passive:false });
  window.addEventListener('touchend',  onDragEnd);
}

function onDragMove(e) {
  if (!drawing || !dragBtn) return;
  const p = getPos(e);
  dragPath.push(p);

  // 버튼 위치를 마우스/터치 위치로 이동
  dragBtn.style.left = p.x + 'px';
  dragBtn.style.top  = p.y + 'px';

  spawnParticles(p.x, p.y, 4, 48);

  // 현재 획 커버 체크 → 충분히 덮였으면 손 안 떼고 다음 획으로 자동 전환
  const cov = checkCoverage(dragPath, activeStroke);
  if (cov >= COVER_RATIO) {
    // 현재 획 완료
    strokeDone[activeStroke] = true;
    for (const pt of dragPath.filter((_,i)=>i%3===0)) spawnParticles(pt.x, pt.y, 2, 280);

    const nextIdx = strokeDone.indexOf(false);
    if (nextIdx >= 0) {
      // 다음 획으로 전환 — 버튼을 다음 획 시작점으로 순간 이동
      activeStroke = nextIdx;
      dragPath = [p]; // 경로 리셋 (현재 위치에서 새 획 시작)
      const data = STROKE_DATA[currentLetter];
      const sp   = pathStartPt(data[nextIdx].path);
      const dir  = pathStartDir(data[nextIdx].path);
      const angleDeg = Math.atan2(dir.y, dir.x) * 180 / Math.PI;

      // 버튼 번호·화살표 갱신
      dragBtn.textContent = String(data[nextIdx].n);
      // 기존 arrow span 제거 후 새로 생성
      dragBtn.querySelectorAll('span').forEach(s => s.remove());
      const arrow = document.createElement('span');
      arrow.style.cssText = `position:absolute;left:50%;top:50%;width:32px;height:3px;background:rgba(30,10,80,0.65);transform-origin:0 50%;transform:rotate(${angleDeg}deg) translateY(-50%);pointer-events:none;border-radius:2px;`;
      const head = document.createElement('span');
      head.style.cssText = `position:absolute;right:-2px;top:50%;transform:translateY(-50%);border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid rgba(30,10,80,0.75);`;
      arrow.appendChild(head);
      dragBtn.appendChild(arrow);

      updateProgressDots();
    } else {
      // 모든 획 완료 — 드래그 종료
      onDragEnd();
      return;
    }
  }

  updateGuideProgress(activeStroke, dragPath);
}

function onDragMoveT(e) {
  e.preventDefault();
  onDragMove(e);
}

function onDragEnd() {
  window.removeEventListener('mousemove', onDragMove);
  window.removeEventListener('mouseup',   onDragEnd);
  window.removeEventListener('touchmove', onDragMoveT);
  window.removeEventListener('touchend',  onDragEnd);

  if (!drawing) return;
  drawing = false;

  const idx = activeStroke;
  activeStroke = -1;
  if (dragBtn) { dragBtn.classList.remove('dragging'); dragBtn = null; }

  const cov = checkCoverage(dragPath, idx);
  if (idx >= 0 && cov >= COVER_RATIO) {
    strokeDone[idx] = true;
    // 완성 파티클
    for (const pt of dragPath.filter((_,i)=>i%3===0)) spawnParticles(pt.x, pt.y, 2, 280);
    if (strokeDone.every(Boolean)) setTimeout(tryPraise, 200);
  }

  dragPath = [];
  currentPath = [];
  updateProgressDots();
  drawGuideStrokes(currentLetter);
}

// 드래그 진행 중 실시간으로 현재 획 가이드선에 진행 표시
function updateGuideProgress(strokeIdx, path) {
  const data = STROKE_DATA[currentLetter];
  if (!data || strokeIdx < 0) return;

  // 기존 guide 다시 그리기 (완료된 획 + 현재 진행 획 점선 배경)
  drawBackground();
  data.forEach((stroke, i) => {
    const done   = strokeDone[i];
    const isCur  = i === strokeIdx;
    const p2d    = new Path2D(stroke.path);

    gCtx.save();
    gCtx.lineCap = 'round'; gCtx.lineJoin = 'round';

    if (done) {
      gCtx.strokeStyle = 'rgba(210,155,255,0.95)'; gCtx.lineWidth = 32;
      gCtx.stroke(p2d);
    } else if (isCur) {
      // 점선 배경
      gCtx.strokeStyle = 'rgba(255,255,255,0.22)'; gCtx.lineWidth = 30;
      gCtx.setLineDash([16,11]); gCtx.stroke(p2d); gCtx.setLineDash([]);

      // 버튼이 지나간 부분 실선 채우기
      const strokePts = samplePath(stroke.path, 80);
      let coveredUntil = 0;
      for (let si = 0; si < strokePts.length; si++) {
        let hit = false;
        for (const up of path) {
          if (Math.hypot(strokePts[si].x - up.x, strokePts[si].y - up.y) < HIT_RADIUS) { hit=true; break; }
        }
        if (hit) coveredUntil = si;
      }
      if (coveredUntil > 1) {
        gCtx.strokeStyle = 'rgba(255,220,80,0.97)'; gCtx.lineWidth = 32;
        gCtx.beginPath();
        gCtx.moveTo(strokePts[0].x, strokePts[0].y);
        for (let si=1; si<=coveredUntil; si++) gCtx.lineTo(strokePts[si].x, strokePts[si].y);
        gCtx.stroke();
      }
    } else {
      gCtx.strokeStyle = 'rgba(160,110,220,0.20)'; gCtx.lineWidth = 26;
      gCtx.setLineDash([10,12]); gCtx.stroke(p2d); gCtx.setLineDash([]);
    }
    gCtx.restore();
  });
}

// ══════════════════════════════════════════
// 12. 지우기 & 칭찬
// ══════════════════════════════════════════
function clearDrawing() {
  drawnPaths.length = 0; currentPath = []; particles.length = 0;
  document.getElementById('praise').textContent = '';
}
document.getElementById('clear-btn').onclick = () => {
  clearDrawing(); initStrokes(currentLetter); drawGuideStrokes(currentLetter);
};

const PRAISES = ['완성! 🎉','최고예요! ⭐','훌륭해요! 🌟','대단해요! 🎊','완벽해요! 💖','멋있어요! 🦋'];
let praiseTimer;
function tryPraise() {
  const el = document.getElementById('praise');
  el.textContent = PRAISES[Math.floor(Math.random()*PRAISES.length)];
  clearTimeout(praiseTimer);
  praiseTimer = setTimeout(() => { el.textContent=''; }, 3000);
  for (let i=0;i<50;i++) {
    const p = new Particle(W/2, H/2, Math.random()*140+10);
    p.vx = (Math.random()-.5)*14; p.vy = (Math.random()-.5)*14;
    p.r = Math.random()*11+5; p.decay = 0.009;
    particles.push(p);
  }
}

// ══════════════════════════════════════════
// 13. 초기화
// ══════════════════════════════════════════
function init() {
  renderButtons(TABS.ga);
  initStrokes('가');
  drawGuideStrokes('가');
}
document.fonts && document.fonts.ready
  ? document.fonts.ready.then(init)
  : window.addEventListener('load', init);
</script>
