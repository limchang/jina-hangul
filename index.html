<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진아의 글자 공부</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg,#1a0533 0%,#0d1b4b 50%,#001a2e 100%);
      min-height:100vh;
      font-family:'Malgun Gothic','맑은 고딕',sans-serif;
      overflow-x:hidden; user-select:none;
    }
    #particle-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:0;
    }
    #app {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      padding:14px 10px; min-height:100vh;
    }
    h1 {
      color:#fff; font-size:1.6rem; margin-bottom:3px;
      text-shadow:0 0 20px rgba(255,180,255,0.9); letter-spacing:3px;
    }
    #subtitle { color:rgba(255,255,255,0.55); font-size:0.78rem; margin-bottom:12px; }

    /* 탭 */
    #tabs { display:flex; gap:7px; margin-bottom:11px; }
    .tab-btn {
      padding:6px 20px; border-radius:20px;
      border:2px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.07);
      color:rgba(255,255,255,0.7); font-size:0.92rem;
      cursor:pointer; transition:all 0.18s; font-family:inherit;
    }
    .tab-btn.active {
      background:rgba(175,70,255,0.45); border-color:rgba(200,120,255,0.9);
      color:#fff; box-shadow:0 0 13px rgba(175,70,255,0.5);
    }

    /* 글자 선택 버튼 */
    #letter-selector {
      display:flex; flex-wrap:wrap; gap:7px;
      justify-content:center; margin-bottom:11px; max-width:560px;
    }
    .letter-btn {
      width:46px; height:46px; border-radius:11px;
      border:2px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.07); color:#fff;
      font-size:1.25rem; cursor:pointer; transition:all 0.16s; font-family:inherit;
    }
    .letter-btn:hover { background:rgba(200,100,255,0.28); border-color:rgba(200,100,255,0.6); transform:scale(1.07); }
    .letter-btn.active {
      background:rgba(195,75,255,0.55); border-color:#cc66ff;
      transform:scale(1.11); box-shadow:0 0 14px rgba(195,75,255,0.6);
    }

    /* 동물 패널 */
    #animal-panel {
      display:flex; align-items:center; justify-content:center;
      gap:12px; margin-bottom:10px; width:320px;
    }
    /* 동물 카드 */
    #animal-card {
      background:rgba(255,255,255,0.08);
      border:2px solid rgba(255,255,255,0.18);
      border-radius:18px; padding:8px 10px;
      display:flex; flex-direction:column; align-items:center;
      gap:4px; min-width:110px;
      box-shadow:0 0 18px rgba(180,120,255,0.25);
    }
    #animal-card svg { display:block; }
    #animal-name {
      font-size:0.85rem; color:#fff; font-weight:bold;
      text-shadow:0 0 10px rgba(255,200,255,0.8); letter-spacing:1px;
    }
    /* 음식 아이콘 그리드 */
    #food-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:7px; flex:1;
    }
    .food-btn {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; padding:8px 6px; border-radius:14px;
      border:2px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.08);
      color:#fff; cursor:pointer;
      transition:transform 0.15s, background 0.15s, border-color 0.15s;
      font-family:inherit;
    }
    .food-btn:hover {
      background:rgba(200,130,255,0.32); border-color:rgba(220,160,255,0.7);
      transform:scale(1.08);
    }
    .food-btn.pop { animation:itemPop 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    .food-btn svg { display:block; }
    .food-label { font-size:0.68rem; opacity:0.9; }

    /* 캔버스 */
    #canvas-wrap {
      position:relative; width:320px; height:320px;
      border-radius:20px;
      box-shadow:0 0 0 2px rgba(175,90,255,0.45),
                 0 0 40px rgba(175,90,255,0.35),
                 0 0 80px rgba(90,120,255,0.15);
    }
    #guide-canvas, #draw-canvas, #stroke-canvas {
      position:absolute; top:0; left:0; width:320px; height:320px;
    }
    #draw-canvas { cursor:crosshair; }

    /* 획순 번호 버튼 */
    .stroke-num-btn {
      position:absolute;
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:bold; font-family:inherit;
      cursor:grab;
      transform:translate(-50%,-50%);
      pointer-events:auto; z-index:10;
      border:3px solid rgba(255,220,80,0.95);
      background:rgba(255,205,40,0.97); color:#1a0533;
      box-shadow:0 0 18px rgba(255,200,50,0.9),0 2px 8px rgba(0,0,0,0.5);
      user-select:none; touch-action:none;
      animation:btnAppear 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes btnAppear {
      from { transform:translate(-50%,-50%) scale(0); opacity:0; }
      to   { transform:translate(-50%,-50%) scale(1); opacity:1; }
    }
    .stroke-num-btn.dragging {
      cursor:grabbing;
      box-shadow:0 0 28px rgba(255,200,50,1),0 0 8px rgba(255,255,255,0.6),0 2px 12px rgba(0,0,0,0.5);
    }

    /* 아이템 버튼 */
    #item-buttons {
      display:flex; gap:9px; margin-top:13px;
    }
    .item-btn {
      display:flex; flex-direction:column; align-items:center;
      padding:9px 16px; border-radius:16px;
      border:2px solid rgba(255,255,255,0.20);
      background:rgba(255,255,255,0.09);
      color:#fff; cursor:pointer;
      transition:transform 0.15s, background 0.15s, border-color 0.15s;
      font-family:inherit; min-width:88px;
    }
    .item-btn:hover {
      background:rgba(200,100,255,0.30); border-color:rgba(220,150,255,0.7);
      transform:scale(1.07);
    }
    .item-btn.pop { animation:itemPop 0.28s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes itemPop {
      0%   { transform:scale(1); }
      50%  { transform:scale(1.25); }
      100% { transform:scale(1); }
    }
    .item-emoji { font-size:1.7rem; line-height:1.2; }
    .item-label { font-size:0.72rem; margin-top:3px; opacity:0.9; }

    /* 획 진행 */
    #stroke-progress {
      display:flex; gap:7px; margin-top:11px; align-items:center;
    }
    .stroke-dot {
      width:13px; height:13px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.4);
      background:rgba(255,255,255,0.1); transition:all 0.3s;
    }
    .stroke-dot.done { background:#bb55ff; border-color:#dd88ff; box-shadow:0 0 8px rgba(187,85,255,0.7); }
    .stroke-dot.active { background:#ffcc44; border-color:#ffee88; box-shadow:0 0 8px rgba(255,200,60,0.7); }
    #stroke-hint { color:rgba(255,255,255,0.5); font-size:0.78rem; margin-left:5px; }

    /* 하단 버튼 */
    #controls { display:flex; gap:11px; margin-top:12px; }
    .ctrl-btn {
      padding:10px 24px; border-radius:28px; border:none;
      font-size:0.95rem; cursor:pointer; transition:all 0.18s;
      font-family:inherit; font-weight:bold;
    }
    #clear-btn { background:rgba(255,65,105,0.75); color:#fff; box-shadow:0 0 16px rgba(255,65,105,0.4); }
    #clear-btn:hover { background:rgba(255,65,105,1); transform:scale(1.06); }

    /* 칭찬 */
    #praise {
      margin-top:12px; font-size:1.6rem; color:#ffe880;
      text-shadow:0 0 18px rgba(255,215,70,1);
      min-height:2rem; font-weight:bold; letter-spacing:2px;
    }
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div id="app">
  <h1>✨ 진아의 글자 공부 ✨</h1>
  <p id="subtitle">번호 버튼을 드래그해서 획을 따라 써 보세요! 🌟</p>

  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('cho')">자음</button>
    <button class="tab-btn" onclick="switchTab('mo')">모음</button>
    <button class="tab-btn" onclick="switchTab('num')">숫자</button>
  </div>

  <div id="letter-selector"></div>

  <div id="animal-panel">
    <div id="animal-card">
      <div id="animal-svg-wrap"></div>
      <span id="animal-name"></span>
    </div>
    <div id="food-grid"></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="guide-canvas" width="320" height="320"></canvas>
    <canvas id="stroke-canvas" width="320" height="320"></canvas>
    <canvas id="draw-canvas"   width="320" height="320"></canvas>
  </div>

  <div id="stroke-progress"></div>

  <div id="controls">
    <button class="ctrl-btn" id="clear-btn">🗑️ 다시 쓰기</button>
  </div>
  <div id="praise"></div>
</div>

<script>
// ══════════════════════════════════════════
// 1. 배경 파티클
// ══════════════════════════════════════════
const bgCanvas = document.getElementById('particle-canvas');
const bgCtx    = bgCanvas.getContext('2d');
function resizeBg() { bgCanvas.width=innerWidth; bgCanvas.height=innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

const bgPts = Array.from({length:60},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.6+0.4,
  dx:(Math.random()-0.5)*0.2, dy:(Math.random()-0.5)*0.2,
  a:Math.random()*0.4+0.1, h:Math.random()*60+248
}));

// 버튼 파티클 (bgCanvas 좌표계 — 화면 절대좌표)
const bgBursts = [];

(function bgLoop(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  // 배경 별
  for(const p of bgPts){
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle=`hsla(${p.h},100%,75%,${p.a})`; bgCtx.fill();
    p.x=(p.x+p.dx+bgCanvas.width)%bgCanvas.width;
    p.y=(p.y+p.dy+bgCanvas.height)%bgCanvas.height;
  }
  // 버튼 파티클
  for(let i=bgBursts.length-1;i>=0;i--){
    const p=bgBursts[i];
    bgCtx.save(); bgCtx.globalAlpha=Math.max(0,p.life);
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle=`hsl(${p.h},100%,72%)`; bgCtx.fill();
    bgCtx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=p.decay; p.r*=0.96;
    if(p.life<=0) bgBursts.splice(i,1);
  }
  requestAnimationFrame(bgLoop);
})();

function spawnBgBurst(cx, cy, hue){
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*6+2;
    bgBursts.push({
      x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
      r:Math.random()*7+3, h:hue??Math.random()*360,
      life:1, decay:Math.random()*0.022+0.012
    });
  }
}

// 6. 캔버스 파티클 클래스
// ══════════════════════════════════════════
const particles=[];
class Particle{
  constructor(x,y,hue){
    const a=Math.random()*Math.PI*2, s=Math.random()*3.5+0.8;
    this.x=x; this.y=y; this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-1.5;
    this.life=1; this.decay=Math.random()*0.025+0.012;
    this.r=Math.random()*7+2; this.hue=hue??(Math.random()*80+250);
    this.isStar=Math.random()<0.3;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.09; this.vx*=0.985; this.life-=this.decay; this.r*=0.975; }
  draw(ctx){
    if(this.life<=0) return;
    ctx.save(); ctx.globalAlpha=this.life;
    if(this.isStar){
      ctx.save(); ctx.translate(this.x,this.y); ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=(i*4*Math.PI/5)-Math.PI/2;
        i===0?ctx.moveTo(Math.cos(a)*this.r,Math.sin(a)*this.r):ctx.lineTo(Math.cos(a)*this.r,Math.sin(a)*this.r);
      }
      ctx.closePath(); ctx.fillStyle=`hsl(${this.hue},100%,72%)`; ctx.fill(); ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
      g.addColorStop(0,`hsl(${this.hue+30},100%,92%)`); g.addColorStop(1,`hsla(${this.hue},100%,60%,0)`);
      ctx.fillStyle=g; ctx.fill();
    }
    ctx.restore();
  }
}

// ══════════════════════════════════════════
// 7. SVG Path 유틸
// ══════════════════════════════════════════
function samplePath(pathStr, n=60){
  const pts=[], cmds=pathStr.match(/[MLHVC][^MLHVC]*/g)||[];
  let cx=0,cy=0,steps;
  for(const cmd of cmds){
    const t=cmd[0], nums=cmd.slice(1).trim().split(/[\s,]+/).map(Number);
    if(t==='M'){ cx=nums[0]; cy=nums[1]; pts.push({x:cx,y:cy}); }
    else if(t==='L'){
      steps=Math.max(8,Math.ceil(n/cmds.length));
      for(let i=1;i<=steps;i++) pts.push({x:cx+(nums[0]-cx)*i/steps,y:cy+(nums[1]-cy)*i/steps});
      cx=nums[0]; cy=nums[1];
    } else if(t==='C'){
      const [cx1,cy1,cx2,cy2,ex,ey]=nums;
      steps=Math.max(14,Math.ceil(n/cmds.length));
      for(let i=1;i<=steps;i++){
        const u=i/steps,v=1-u;
        pts.push({x:v*v*v*cx+3*v*v*u*cx1+3*v*u*u*cx2+u*u*u*ex, y:v*v*v*cy+3*v*v*u*cy1+3*v*u*u*cy2+u*u*u*ey});
      }
      cx=ex; cy=ey;
    }
  }
  return pts;
}
function pathStartPt(p){ const m=p.match(/M\s*([\d.]+)[,\s]+([\d.]+)/); return m?{x:+m[1],y:+m[2]}:{x:160,y:160}; }
function pathStartDir(p){
  const pts=samplePath(p,10);
  if(pts.length<3) return {x:1,y:0};
  const dx=pts[2].x-pts[0].x, dy=pts[2].y-pts[0].y, len=Math.hypot(dx,dy)||1;
  return {x:dx/len,y:dy/len};
}

// ══════════════════════════════════════════
// 8. 획 상태 관리
// ══════════════════════════════════════════
let strokeDone=[], activeStroke=-1;
const HIT_RADIUS=26, COVER_RATIO=0.40;

function initStrokes(letter){
  const d=STROKE_DATA[letter];
  strokeDone=d?new Array(d.length).fill(false):[];
  activeStroke=-1;
  updateProgressDots();
}

function checkCoverage(userPath, idx){
  const d=STROKE_DATA[currentLetter]; if(!d) return 0;
  const pts=samplePath(d[idx].path,40); let covered=0;
  for(const sp of pts){
    for(const up of userPath){
      if(Math.hypot(sp.x-up.x,sp.y-up.y)<HIT_RADIUS){covered++;break;}
    }
  }
  return covered/pts.length;
}

function updateProgressDots(){
  const bar=document.getElementById('stroke-progress');
  const d=STROKE_DATA[currentLetter];
  bar.innerHTML='';
  if(!d) return;
  d.forEach((_,i)=>{
    const dot=document.createElement('div');
    dot.className='stroke-dot'+(strokeDone[i]?' done':(i===strokeDone.indexOf(false)?' active':''));
    bar.appendChild(dot);
  });
  const hint=document.createElement('span'); hint.id='stroke-hint';
  hint.textContent=`${strokeDone.filter(Boolean).length} / ${d.length} 획`;
  bar.appendChild(hint);
}

function drawBackground(){
  gCtx.clearRect(0,0,W,H);
  gCtx.fillStyle='rgba(14,7,44,0.93)';
  gCtx.beginPath(); gCtx.roundRect(0,0,W,H,20); gCtx.fill();
  gCtx.strokeStyle='rgba(255,255,255,0.07)'; gCtx.lineWidth=1; gCtx.setLineDash([4,7]);
  gCtx.beginPath(); gCtx.moveTo(W/2,10); gCtx.lineTo(W/2,H-10); gCtx.moveTo(10,H/2); gCtx.lineTo(W-10,H/2); gCtx.stroke();
  gCtx.setLineDash([]);
  gCtx.strokeStyle='rgba(155,90,255,0.28)'; gCtx.lineWidth=1.5; gCtx.setLineDash([7,5]);
  gCtx.beginPath(); gCtx.roundRect(13,13,W-26,H-26,13); gCtx.stroke(); gCtx.setLineDash([]);
}

function drawGuideStrokes(letter){
  drawBackground();
  const d=STROKE_DATA[letter];
  if(!d){
    gCtx.save();
    gCtx.font=`900 210px 'Malgun Gothic','맑은 고딕',sans-serif`;
    gCtx.textAlign='center'; gCtx.textBaseline='middle';
    gCtx.strokeStyle='rgba(190,130,255,0.55)'; gCtx.lineWidth=4; gCtx.strokeText(letter,W/2,H/2+8);
    gCtx.fillStyle='rgba(200,160,255,0.28)'; gCtx.fillText(letter,W/2,H/2+8);
    gCtx.restore(); return;
  }
  sCtx.clearRect(0,0,W,H);
  d.forEach((stroke,i)=>{
    const done=strokeDone[i], isNext=i===strokeDone.indexOf(false);
    const p2d=new Path2D(stroke.path);
    gCtx.save(); gCtx.lineCap='round'; gCtx.lineJoin='round';
    if(done){ gCtx.strokeStyle='rgba(210,155,255,0.95)'; gCtx.lineWidth=32; }
    else if(isNext){ gCtx.strokeStyle='rgba(255,255,255,0.40)'; gCtx.lineWidth=30; gCtx.setLineDash([16,11]); }
    else { gCtx.strokeStyle='rgba(160,110,220,0.22)'; gCtx.lineWidth=26; gCtx.setLineDash([10,12]); }
    gCtx.stroke(p2d); gCtx.setLineDash([]); gCtx.restore();
  });
  updateStrokeButtons(letter);
}

function updateStrokeButtons(letter){
  const wrap=document.getElementById('canvas-wrap');
  wrap.querySelectorAll('.stroke-num-btn').forEach(el=>el.remove());
  const d=STROKE_DATA[letter]; if(!d) return;
  const nextIdx=strokeDone.indexOf(false); if(nextIdx<0) return;
  const stroke=d[nextIdx];
  const sp=pathStartPt(stroke.path), dir=pathStartDir(stroke.path);
  const angleDeg=Math.atan2(dir.y,dir.x)*180/Math.PI;
  const btn=document.createElement('div');
  btn.className='stroke-num-btn'; btn.id='active-stroke-btn';
  btn.textContent=String(stroke.n);
  btn.style.left=sp.x+'px'; btn.style.top=sp.y+'px';
  const arrow=document.createElement('span');
  arrow.style.cssText=`position:absolute;left:50%;top:50%;width:32px;height:3px;background:rgba(30,10,80,0.65);transform-origin:0 50%;transform:rotate(${angleDeg}deg) translateY(-50%);pointer-events:none;border-radius:2px;`;
  const head=document.createElement('span');
  head.style.cssText=`position:absolute;right:-2px;top:50%;transform:translateY(-50%);border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid rgba(30,10,80,0.75);`;
  arrow.appendChild(head); btn.appendChild(arrow);
  btn.addEventListener('mousedown',e=>{e.preventDefault();startStrokeDrag(e,nextIdx,btn);});
  btn.addEventListener('touchstart',e=>{e.preventDefault();startStrokeDrag(e,nextIdx,btn);},{passive:false});
  wrap.appendChild(btn);
}

// 10. 파티클 루프 (캔버스)
// ══════════════════════════════════════════
let currentPath=[], drawnPaths=[];
(function drawLoop(){
  dCtx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    particles[i].update(); particles[i].draw(dCtx);
    if(particles[i].life<=0) particles.splice(i,1);
  }
  requestAnimationFrame(drawLoop);
})();

function spawnParticles(x,y,n=5,hue){ for(let i=0;i<n;i++) particles.push(new Particle(x,y,hue)); }

// ══════════════════════════════════════════
// 11. 드래그 로직
// ══════════════════════════════════════════
function getPos(e){
  const rect=drawCanvas.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy};
}

let drawing=false, dragBtn=null, dragPath=[];

function startStrokeDrag(e,idx,btn){
  drawing=true; activeStroke=idx; dragBtn=btn; dragPath=[];
  const p=getPos(e); dragPath.push(p);
  btn.classList.add('dragging'); spawnParticles(p.x,p.y,8,55);
  window.addEventListener('mousemove',onDragMove);
  window.addEventListener('mouseup',onDragEnd);
  window.addEventListener('touchmove',onDragMoveT,{passive:false});
  window.addEventListener('touchend',onDragEnd);
}

function onDragMove(e){
  if(!drawing||!dragBtn) return;
  const p=getPos(e); dragPath.push(p);
  dragBtn.style.left=p.x+'px'; dragBtn.style.top=p.y+'px';
  spawnParticles(p.x,p.y,4,48);

  // 현재 획 커버 체크 → 완료 시 다음 획으로 자동 전환
  if(checkCoverage(dragPath,activeStroke)>=COVER_RATIO){
    strokeDone[activeStroke]=true;
    for(const pt of dragPath.filter((_,i)=>i%3===0)) spawnParticles(pt.x,pt.y,2,280);
    const nextIdx=strokeDone.indexOf(false);
    if(nextIdx>=0){
      activeStroke=nextIdx; dragPath=[p];
      const d=STROKE_DATA[currentLetter];
      const nsp=pathStartPt(d[nextIdx].path), ndir=pathStartDir(d[nextIdx].path);
      const ang=Math.atan2(ndir.y,ndir.x)*180/Math.PI;
      dragBtn.textContent=String(d[nextIdx].n);
      dragBtn.querySelectorAll('span').forEach(s=>s.remove());
      const arr=document.createElement('span');
      arr.style.cssText=`position:absolute;left:50%;top:50%;width:32px;height:3px;background:rgba(30,10,80,0.65);transform-origin:0 50%;transform:rotate(${ang}deg) translateY(-50%);pointer-events:none;border-radius:2px;`;
      const hd=document.createElement('span');
      hd.style.cssText=`position:absolute;right:-2px;top:50%;transform:translateY(-50%);border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid rgba(30,10,80,0.75);`;
      arr.appendChild(hd); dragBtn.appendChild(arr);
      updateProgressDots();
    } else { onDragEnd(); return; }
  }
  updateGuideProgress(activeStroke,dragPath);
}

function onDragMoveT(e){ e.preventDefault(); onDragMove(e); }

function onDragEnd(){
  window.removeEventListener('mousemove',onDragMove);
  window.removeEventListener('mouseup',onDragEnd);
  window.removeEventListener('touchmove',onDragMoveT);
  window.removeEventListener('touchend',onDragEnd);
  if(!drawing) return; drawing=false;
  const idx=activeStroke; activeStroke=-1;
  if(dragBtn){dragBtn.classList.remove('dragging'); dragBtn=null;}
  if(idx>=0 && checkCoverage(dragPath,idx)>=COVER_RATIO){
    strokeDone[idx]=true;
    for(const pt of dragPath.filter((_,i)=>i%3===0)) spawnParticles(pt.x,pt.y,2,280);
    if(strokeDone.every(Boolean)) setTimeout(tryPraise,200);
  }
  dragPath=[]; currentPath=[];
  updateProgressDots(); drawGuideStrokes(currentLetter);
}

function updateGuideProgress(strokeIdx,path){
  const d=STROKE_DATA[currentLetter]; if(!d||strokeIdx<0) return;
  drawBackground();
  d.forEach((stroke,i)=>{
    const done=strokeDone[i], isCur=i===strokeIdx;
    const p2d=new Path2D(stroke.path);
    gCtx.save(); gCtx.lineCap='round'; gCtx.lineJoin='round';
    if(done){
      gCtx.strokeStyle='rgba(210,155,255,0.95)'; gCtx.lineWidth=32; gCtx.stroke(p2d);
    } else if(isCur){
      gCtx.strokeStyle='rgba(255,255,255,0.22)'; gCtx.lineWidth=30; gCtx.setLineDash([16,11]); gCtx.stroke(p2d); gCtx.setLineDash([]);
      const spts=samplePath(stroke.path,80); let until=0;
      for(let si=0;si<spts.length;si++){
        let hit=false;
        for(const up of path){ if(Math.hypot(spts[si].x-up.x,spts[si].y-up.y)<HIT_RADIUS){hit=true;break;} }
        if(hit) until=si;
      }
      if(until>1){
        gCtx.strokeStyle='rgba(255,220,80,0.97)'; gCtx.lineWidth=32;
        gCtx.beginPath(); gCtx.moveTo(spts[0].x,spts[0].y);
        for(let si=1;si<=until;si++) gCtx.lineTo(spts[si].x,spts[si].y);
        gCtx.stroke();
      }
    } else {
      gCtx.strokeStyle='rgba(160,110,220,0.20)'; gCtx.lineWidth=26; gCtx.setLineDash([10,12]); gCtx.stroke(p2d); gCtx.setLineDash([]);
    }
    gCtx.restore();
  });
}

// ══════════════════════════════════════════
// 12. 동물 패널 & 음식 아이콘
// ══════════════════════════════════════════
function renderAnimalPanel(letter){
  const data    = ANIMAL_DATA[letter];
  const svgData = SVG_ICONS[letter];
  const svgWrap = document.getElementById('animal-svg-wrap');
  const nameEl  = document.getElementById('animal-name');
  const grid    = document.getElementById('food-grid');
  grid.innerHTML = ''; svgWrap.innerHTML = '';

  if(!data){ nameEl.textContent=''; return; }

  // 동물 일러스트: SVG 있으면 SVG, 없으면 이모지 크게
  if(svgData){
    svgWrap.innerHTML = svgData.animal;
  } else {
    svgWrap.innerHTML = `<div style="font-size:3rem;line-height:1;padding:4px 0">${data.emoji}</div>`;
  }
  nameEl.textContent = data.label;

  // 음식 아이콘 버튼 (SVG 있으면 SVG, 없으면 이모지)
  const foods = svgData ? svgData.foods : data.foods;
  foods.forEach((food, fi)=>{
    const btn = document.createElement('button');
    btn.className = 'food-btn';
    const iconHtml = svgData
      ? food.svg
      : `<span style="font-size:1.6rem;line-height:1">${food.e??food.emoji}</span>`;
    const labelTxt = food.label ?? food.l;
    btn.innerHTML = iconHtml + `<span class="food-label">${labelTxt}</span>`;
    btn.addEventListener('click', ()=>{
      btn.classList.remove('pop');
      void btn.offsetWidth;
      btn.classList.add('pop');
      btn.addEventListener('animationend',()=>btn.classList.remove('pop'),{once:true});
      const rect=btn.getBoundingClientRect();
      // 각 음식마다 다른 색 파티클
      const hues=[30,120,280];
      spawnBgBurst(rect.left+rect.width/2, rect.top+rect.height/2, hues[fi]??Math.random()*360);
    });
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════
// 13. 탭 & 글자 선택
// ══════════════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',Object.keys(TABS)[i]===tab);
  });
  renderButtons(TABS[tab]);
  selectLetter(TABS[tab][0]);
}

function renderButtons(letters){
  const sel=document.getElementById('letter-selector');
  sel.innerHTML='';
  letters.forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className='letter-btn'+(i===0?' active':'');
    btn.textContent=l;
    btn.onclick=()=>selectLetter(l);
    sel.appendChild(btn);
  });
}

function selectLetter(l){
  currentLetter=l;
  document.querySelectorAll('.letter-btn').forEach(b=>b.classList.toggle('active',b.textContent===l));
  clearDrawing(); initStrokes(l); drawGuideStrokes(l); renderAnimalPanel(l);
}

// ══════════════════════════════════════════
// 14. 지우기 & 칭찬
// ══════════════════════════════════════════
function clearDrawing(){
  drawnPaths.length=0; currentPath=[]; particles.length=0;
  document.getElementById('praise').textContent='';
  document.getElementById('canvas-wrap').querySelectorAll('.stroke-num-btn').forEach(el=>el.remove());
}
document.getElementById('clear-btn').onclick=()=>{
  clearDrawing(); initStrokes(currentLetter); drawGuideStrokes(currentLetter);
};

const PRAISES=['완성! 🎉','최고예요! ⭐','훌륭해요! 🌟','대단해요! 🎊','완벽해요! 💖','멋있어요! 🦋'];
let praiseTimer;
function tryPraise(){
  const el=document.getElementById('praise');
  el.textContent=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  clearTimeout(praiseTimer);
  praiseTimer=setTimeout(()=>{el.textContent='';},3000);
  for(let i=0;i<50;i++){
    const p=new Particle(W/2,H/2,Math.random()*140+10);
    p.vx=(Math.random()-.5)*14; p.vy=(Math.random()-.5)*14; p.r=Math.random()*11+5; p.decay=0.009;
    particles.push(p);
  }
}

// ══════════════════════════════════════════
// 15. 초기화
// ══════════════════════════════════════════
function init(){
  renderButtons(TABS.cho);
  selectLetter('ㄱ');
}
document.fonts&&document.fonts.ready
  ? document.fonts.ready.then(init)
  : window.addEventListener('load',init);
</script>
