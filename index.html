<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>진아의 프리미엄 한글 공부 - 따라쓰기</title>
  <meta name="description" content="진아를 위한 프리미엄 한글 따라쓰기 앱입니다.">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="bg-layer"></div>

  <div id="app-container">
    <header>
      <div class="btn-home" onclick="location.reload()" title="홈으로">
        <svg viewBox="0 0 100 100">
          <path d="M25 50 L50 25 L75 50 V75 H60 V55 H40 V75 H25 Z" fill="white" />
        </svg>
      </div>
      <h1 class="app-title">진아의 한글 공부</h1>
    </header>

    <div class="main-layout">
      <!-- 왼쪽: 자음 패널 -->
      <aside class="side-panel left-panel" id="panel-cons">
        <div class="panel-label">자 음</div>
        <div class="panel-list" id="cons-list"></div>
      </aside>

      <!-- 가운데: 카드 2개 나란히 -->
      <main>
        <div class="nav-arrow left" title="이전">&#10094;</div>

        <div class="cards-row">
          <!-- 자음 카드 -->
          <div class="study-card active-card" id="card-cons" data-card="cons">
            <div class="card-label">자음</div>
            <canvas class="guide-cv" id="guide-canvas-cons"></canvas>
            <canvas class="arrow-cv" id="arrow-canvas-cons"></canvas>
            <canvas class="trace-cv" id="trace-canvas-cons"></canvas>
            <div class="overlay-icons" id="overlay-cons"></div>
          </div>

          <!-- 음절 카드 -->
          <div class="study-card" id="card-syl" data-card="syl">
            <div class="card-label">가나다</div>
            <canvas class="guide-cv" id="guide-canvas-syl"></canvas>
            <canvas class="arrow-cv" id="arrow-canvas-syl"></canvas>
            <canvas class="trace-cv" id="trace-canvas-syl"></canvas>
            <div class="overlay-icons" id="overlay-syl"></div>
          </div>
        </div>

        <div class="nav-arrow right" title="다음">&#10095;</div>
      </main>

      <!-- 오른쪽: 모음 패널 -->
      <aside class="side-panel right-panel" id="panel-vow">
        <div class="panel-label">모 음</div>
        <div class="panel-list" id="vow-list"></div>
      </aside>
    </div>
  </div>

  <script src="src/icon-map.js?v=1"></script>
  <script src="src/data.js?v=9"></script>
  <script src="src/TracingEngine.js?v=9"></script>
  <script src="src/particles.js?v=2"></script>
  <script src="src/arrow.js?v=2"></script>
  <script src="src/render.js?v=3"></script>
  <script src="src/input.js?v=3"></script>
  <script src="src/ui.js?v=3"></script>
  <script src="src/App.js?v=10"></script>
</body>

</html>
