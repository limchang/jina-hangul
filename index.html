<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>진아의 프리미엄 한글 공부 - 따라쓰기</title>
  <meta name="description" content="진아를 위한 프리미엄 한글 따라쓰기 앱입니다.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="bg-layer"></div>
  
  <div id="app-container">
    <header>
      <div class="btn-home" onclick="location.reload()" title="홈으로">
        <svg viewBox="0 0 100 100">
          <path d="M25 50 L50 25 L75 50 V75 H60 V55 H40 V75 H25 Z" fill="white" />
        </svg>
      </div>
      <div class="tab-container">
        <div class="tab-btn active" id="tab-cons" title="자음">자 음</div>
        <div class="tab-btn" id="tab-vow" title="모음">모 음</div>
      </div>
    </header>

    <main>
      <div class="nav-arrow left" title="이전">&#10094;</div>
      
      <div class="study-card" id="study-card">
        <!-- Background guide will be drawn here -->
        <canvas id="guide-canvas"></canvas>
        <!-- The user's active drawing will be drawn here -->
        <canvas id="trace-canvas"></canvas>
        <!-- Icons (Gazelle and Star) overlay -->
        <div id="overlay-icons"></div>
      </div>
      
      <div class="nav-arrow right" title="다음">&#10095;</div>
    </main>

    <footer id="footer-menu"></footer>
  </div>

  <script src="src/data.js?v=5"></script>
  <script src="src/TracingEngine.js?v=5"></script>
  <script src="src/App.js?v=5"></script>
</body>
</html>
